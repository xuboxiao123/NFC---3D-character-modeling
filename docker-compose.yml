version: '3.8'

# ============================================================
#  NFC AI 角色创作系统 - Docker Compose 一键部署
#  用法：
#     1. 复制 .env.example 为 .env，填入你的 API 密钥
#     2. docker-compose up -d
#     3. 浏览器访问 http://localhost
# ============================================================

services:
  # ============================================================
  #  MySQL 数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: nfc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-nfc_secure_pass_2026}
      MYSQL_DATABASE: ai_character_system
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - nfc-network

  # ============================================================
  #  Spring Boot 后端
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nfc-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      # 强行让 Spring Boot 容器内部在 8088 端口启动，完美对齐前端 Nginx 的默认代理路径
      SERVER_PORT: 8088
      PORT: 8088
      
      # 🔥【新增核心指令】强行开启 JPA 自动检查并建表，解决 characters 表不存在的问题
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      
      # 数据库连接
      DB_URL: jdbc:mysql://mysql:3306/ai_character_system?useSSL=false&serverTimezone=UTC&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-nfc_secure_pass_2026}
      
      # Spring Boot 官方标准数据库环境变量
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_character_system?useSSL=false&serverTimezone=UTC&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-nfc_secure_pass_2026}
      
      # 豆包 API（图生图）
      DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-ep-20260329195113-47fgd}
      DOUBAO_URL: ${DOUBAO_URL:-https://ark.cn-beijing.volces.com/api/v3/images/generations}
      
      # 腾讯混元 3D
      HUNYUAN_API_KEY: ${HUNYUAN_API_KEY}
      HUNYUAN_SUBMIT_URL: ${HUNYUAN_SUBMIT_URL:-https://api.ai3d.cloud.tencent.com/v1/ai3d/submit}
      HUNYUAN_QUERY_URL: ${HUNYUAN_QUERY_URL:-https://api.ai3d.cloud.tencent.com/v1/ai3d/query}
      
      # Cloudflare R2 图床（注入默认值防止空指针自杀）
      R2_ENDPOINT: ${R2_ENDPOINT:-https://mock.r2.endpoint.com}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-mock_r2_access_key_12345}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-mock_r2_secret_key_abcde}
      R2_BUCKET: ${R2_BUCKET:-capstone}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-http://localhost:8088}
      
      # 本地模型存储
      LOCAL_IMAGE_DIR: /app/storage/images/
      LOCAL_MODEL_DIR: /app/storage/models/
      LOCAL_MODEL_TEMP_DIR: /app/storage/tmp/
      LOCAL_PUBLIC_BASE_URL: http://localhost:8088
      
      TZ: Asia/Shanghai
    volumes:
      - backend_storage:/app/storage
    ports:
      # 确保容器内外全部使用 8088 端口
      - "8088:8088"
    networks:
      - nfc-network

  # ============================================================
  #  Vue 3 前端（nginx）
  # ============================================================
  frontend:
    build:
      context: ./fontend
      dockerfile: Dockerfile
    container_name: nfc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - nfc-network

networks:
  nfc-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  backend_storage:
    driver: local